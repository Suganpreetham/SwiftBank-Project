
services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: swiftbank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - swiftbank-net

  redis:
    image: redis:7-alpine
    container_name: swiftbank-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - swiftbank-net

  kafka:
    image: apache/kafka:latest
    container_name: swiftbank-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - swiftbank-net

  # ─────────────────────────────────────────
  # SERVICES
  # ─────────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: swiftbank-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user:8081
      ACCOUNT_SERVICE_URL: http://account:8082
      TRANSACTION_SERVICE_URL: http://transaction:8083
    depends_on:
      - redis
      - user
      - account
      - transaction
    networks:
      - swiftbank-net

  user:
    build: ./user
    container_name: swiftbank-user
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT}:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${USER_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
    depends_on:
      - postgres
    networks:
      - swiftbank-net

  account:
    build: ./account
    container_name: swiftbank-account
    restart: unless-stopped
    ports:
      - "${ACCOUNT_SERVICE_PORT}:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${ACCOUNT_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - postgres
      - redis
    networks:
      - swiftbank-net

  transaction:
    build: ./transaction
    container_name: swiftbank-transaction
    restart: unless-stopped
    ports:
      - "${TRANSACTION_SERVICE_PORT}:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${TRANSACTION_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - swiftbank-net

  fraud:
    build: ./fraud
    container_name: swiftbank-fraud
    restart: unless-stopped
    ports:
      - "${FRAUD_SERVICE_PORT}:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${FRAUD_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - swiftbank-net

  notification:
    build: ./notification
    container_name: swiftbank-notification
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - swiftbank-net

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────

volumes:
  postgres_data:

networks:
  swiftbank-net:
    driver: bridge