spring.application.name=user
server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:swiftbank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:swiftbank123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:swiftbank-super-secret-jwt-key-2024-make-this-long}
jwt.expiry=${JWT_EXPIRY:86400000}
