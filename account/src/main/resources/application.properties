spring.application.name=account
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/account_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:swiftbank}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:swiftbank123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:swiftbank-redis}
spring.data.redis.port=6379
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:redis123}

jwt.secret=${JWT_SECRET:swiftbank-super-secret-jwt-key-2024-make-this-long}